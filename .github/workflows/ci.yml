name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff check
        run: ruff check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: sds_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Create test env file
        run: |
          cat > tests/.env.test << 'EOF'
          TEST_DATABASE_URL=postgresql+asyncpg://postgres:testpass@localhost:5432/sds_test
          DATABASE_URL=postgresql+asyncpg://postgres:testpass@localhost:5432/sds_test
          JWT_SECRET_KEY=test-secret-key-for-ci-minimum-32-characters
          TELEGRAM_BOT_TOKEN=test-token
          SENTRY_ENABLED=false
          LOG_LEVEL=WARNING
          EOF

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/sds_test
          JWT_SECRET_KEY: test-secret-key-for-ci-minimum-32-characters
          TELEGRAM_BOT_TOKEN: test-token
        run: alembic upgrade head

      - name: Run tests with coverage gate
        run: |
          pytest tests/ -v \
            --cov=src/api/v1/routers/auth.py \
            --cov=src/api/v1/routers/customers.py \
            --cov=src/api/v1/routers/orders.py \
            --cov=src/api/v1/routers/users.py \
            --cov=src/api/v1/schemas \
            --cov=src/core/security.py \
            --cov-report=xml \
            --cov-fail-under=50

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run security rules
        run: ruff check src/ tests/ --select S --output-format github
