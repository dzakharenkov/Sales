version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/sales
      JWT_SECRET_KEY: test-secret-key-for-local-compose-minimum-32-bytes
      TELEGRAM_BOT_TOKEN: local-dev-token
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_DEBUG: "false"
      LOG_LEVEL: INFO
      SENTRY_ENABLED: "false"
      UPLOAD_DIR: /app/photo
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./photo:/app/photo

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
